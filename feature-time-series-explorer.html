<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Time Series Data Explorer — FDRI Digital Platform</title>
  <link rel="icon" href="assets/fdri-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/fdri.css">
  <script>window.FDRI_PAGE = {
    type: "feature", active: "time-series-explorer",
    learnHref: "learn-time-series-explorer.html", learnLabel: "Time Series Data Explorer"
  };</script>
</head>
<body>
  <main class="page"><div class="container page__inner">

    <div class="tse-toolbar">
      <button class="btn btn--ghost">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="17" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
        22 May 2026 – 02 Jun 2026
      </button>
      <button class="btn btn--ghost">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><line x1="12" y1="5" x2="12" y2="19"/></svg>
        Horizontal
      </button>
    </div>

    <div class="tse-grid">

      <!-- Plot Management -->
      <section class="panel plotmgr">
        <div class="panel__head">
          <span><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="20" x2="4" y2="10"/><line x1="10" y1="20" x2="10" y2="4"/><line x1="16" y1="20" x2="16" y2="14"/></svg> Plot Management</span>
          <button class="btn plotmgr__add">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Plot
          </button>
        </div>
        <div class="empty-state">No plots yet. Choose <strong>Add Plot</strong> to start building a visualisation, or load a Data Story from the Learn page.</div>
      </section>

      <!-- Data Visualization -->
      <section class="panel dataviz">
        <div class="panel__head">
          <span><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="20" x2="4" y2="10"/><line x1="10" y1="20" x2="10" y2="4"/><line x1="16" y1="20" x2="16" y2="14"/></svg> Data Visualization</span>
        </div>
        <div class="dataviz__toolbar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-label="Reset axes"><path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 4 3 9 8 9"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-label="Pan"><path d="M5 9l-2 3 2 3M9 5l3-2 3 2M15 19l-3 2-3-2M19 9l2 3-2 3"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-label="Download"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16"/></svg>
        </div>
        <div class="chart" id="tseChart"></div>
      </section>

    </div>
  </div></main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
  <script src="js/components.js"></script>
  <script src="js/time-series.js"></script>
</body>
</html>
